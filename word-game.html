<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>말랑말랑 어휘 게임</title>
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #4FC3F7;
    --sun: #FFD54F;
    --mint: #80CBC4;
    --coral: #FF8A65;
    --lavender: #CE93D8;
    --grass: #A5D6A7;
    --bg: #FFF8E1;
    --card: #FFFFFF;
    --text: #37474F;
    --sub: #78909C;
    --radius: 20px;
    --shadow: 0 4px 20px rgba(0,0,0,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    background-image:
      radial-gradient(circle at 10% 20%, rgba(79,195,247,0.12) 0%, transparent 40%),
      radial-gradient(circle at 90% 80%, rgba(255,213,79,0.15) 0%, transparent 40%),
      radial-gradient(circle at 50% 50%, rgba(128,203,196,0.08) 0%, transparent 60%);
  }

  /* ── 헤더 ── */
  .header {
    padding: 20px 24px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    font-family: 'Gaegu', cursive;
    font-size: 26px;
    font-weight: 700;
    color: var(--sky);
    letter-spacing: -0.5px;
  }
  .logo span { color: var(--coral); }

  /* ── 상태바 ── */
  .statusbar {
    display: flex;
    gap: 10px;
    align-items: center;
    padding: 0 24px 16px;
    flex-wrap: wrap;
  }
  .badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border-radius: 50px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 500;
    box-shadow: var(--shadow);
  }
  .badge .icon { font-size: 16px; }
  .level-badge { color: var(--coral); }
  .score-badge { color: var(--sky); }
  .streak-badge { color: var(--sun); }

  /* ── 레벨 바 ── */
  .levelbar-wrap {
    padding: 0 24px 20px;
  }
  .levelbar-label {
    font-size: 12px;
    color: var(--sub);
    margin-bottom: 6px;
    display: flex;
    justify-content: space-between;
  }
  .levelbar-bg {
    height: 8px;
    background: #E0E0E0;
    border-radius: 10px;
    overflow: hidden;
  }
  .levelbar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--sky), var(--mint));
    border-radius: 10px;
    transition: width 0.6s cubic-bezier(.4,0,.2,1);
  }

  /* ── 모드 탭 ── */
  .mode-tabs {
    display: flex;
    gap: 8px;
    padding: 0 24px 20px;
  }
  .tab-btn {
    flex: 1;
    padding: 10px;
    border: 2px solid transparent;
    border-radius: 14px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .tab-btn.word { background: #E3F2FD; color: #1976D2; }
  .tab-btn.blank { background: #F3E5F5; color: #7B1FA2; }
  .tab-btn.word.active { background: var(--sky); color: white; border-color: #0288D1; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(79,195,247,0.4); }
  .tab-btn.blank.active { background: var(--lavender); color: white; border-color: #8E24AA; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(206,147,216,0.4); }

  /* ── 카드 ── */
  .game-card {
    margin: 0 16px 20px;
    background: var(--card);
    border-radius: 28px;
    padding: 28px 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.10);
    min-height: 260px;
    position: relative;
    overflow: hidden;
    animation: cardIn 0.35s cubic-bezier(.4,0,.2,1);
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(16px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .card-deco {
    position: absolute;
    top: -30px; right: -30px;
    width: 120px; height: 120px;
    border-radius: 50%;
    opacity: 0.08;
  }
  .word-deco { background: var(--sky); }
  .blank-deco { background: var(--lavender); }

  .q-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .q-label.word { color: var(--sky); }
  .q-label.blank { color: var(--lavender); }

  .question-text {
    font-family: 'Gaegu', cursive;
    font-size: 28px;
    font-weight: 700;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 8px;
  }
  .question-hint {
    font-size: 13px;
    color: var(--sub);
    margin-bottom: 24px;
    line-height: 1.6;
  }

  /* 선택지 */
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .choice-btn {
    padding: 14px 10px;
    border: 2px solid #E0E0E0;
    border-radius: 16px;
    background: var(--bg);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    cursor: pointer;
    transition: all 0.18s;
    text-align: center;
    line-height: 1.4;
  }
  .choice-btn:hover:not(:disabled) {
    border-color: var(--sky);
    background: #E3F2FD;
    transform: translateY(-2px);
  }
  .choice-btn.correct {
    background: #E8F5E9;
    border-color: #4CAF50;
    color: #2E7D32;
    animation: pop 0.3s ease;
  }
  .choice-btn.wrong {
    background: #FFEBEE;
    border-color: #EF5350;
    color: #C62828;
    animation: shake 0.3s ease;
  }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.06); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* 빈칸 입력 */
  .blank-input-wrap {
    display: flex;
    gap: 10px;
    margin-top: 8px;
  }
  .blank-input {
    flex: 1;
    padding: 14px 18px;
    border: 2px solid #E0E0E0;
    border-radius: 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s;
    background: var(--bg);
    color: var(--text);
  }
  .blank-input:focus { border-color: var(--lavender); }
  .blank-input.correct { border-color: #4CAF50; background: #E8F5E9; }
  .blank-input.wrong { border-color: #EF5350; background: #FFEBEE; }
  .submit-btn {
    padding: 14px 20px;
    background: var(--lavender);
    color: white;
    border: none;
    border-radius: 16px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
  }
  .submit-btn:hover { background: #BA68C8; transform: translateY(-2px); }
  .submit-btn:disabled { opacity: 0.5; cursor: default; transform: none; }

  /* 피드백 */
  .feedback {
    margin-top: 16px;
    padding: 14px 18px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.6;
    font-weight: 500;
    display: none;
    animation: fadeUp 0.25s ease;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .feedback.show { display: block; }
  .feedback.correct { background: #E8F5E9; color: #2E7D32; }
  .feedback.wrong { background: #FFF3E0; color: #E65100; }

  /* 다음 버튼 */
  .next-btn {
    display: none;
    width: calc(100% - 32px);
    margin: 0 16px 16px;
    padding: 16px;
    background: linear-gradient(135deg, var(--coral), #FF7043);
    color: white;
    border: none;
    border-radius: 18px;
    font-family: 'Gaegu', cursive;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(255,112,67,0.35);
    transition: all 0.2s;
    animation: fadeUp 0.25s ease;
  }
  .next-btn.show { display: block; }
  .next-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,112,67,0.45); }

  /* 로딩 */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 200px;
    gap: 16px;
  }
  .loading-dots {
    display: flex; gap: 8px;
  }
  .loading-dots span {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--sky);
    animation: bounce 0.8s infinite ease-in-out;
  }
  .loading-dots span:nth-child(2) { background: var(--coral); animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { background: var(--mint); animation-delay: 0.3s; }
  @keyframes bounce {
    0%,80%,100% { transform: translateY(0); }
    40% { transform: translateY(-12px); }
  }
  .loading p { font-size: 14px; color: var(--sub); font-weight: 500; }

  /* 캐릭터 */
  .character {
    font-size: 48px;
    text-align: center;
    margin-bottom: 8px;
    animation: wiggle 2s infinite ease-in-out;
  }
  @keyframes wiggle {
    0%,100% { transform: rotate(-5deg); }
    50% { transform: rotate(5deg); }
  }

  /* API 키 입력 화면 */
  .setup-screen {
    margin: 24px 16px;
    background: var(--card);
    border-radius: 28px;
    padding: 32px 24px;
    box-shadow: var(--shadow);
    text-align: center;
  }
  .setup-screen h2 {
    font-family: 'Gaegu', cursive;
    font-size: 24px;
    color: var(--text);
    margin: 16px 0 8px;
  }
  .setup-screen p {
    font-size: 14px;
    color: var(--sub);
    margin-bottom: 24px;
    line-height: 1.7;
  }
  .api-input {
    width: 100%;
    padding: 14px 18px;
    border: 2px solid #E0E0E0;
    border-radius: 16px;
    font-size: 14px;
    font-family: monospace;
    outline: none;
    margin-bottom: 12px;
    transition: border-color 0.2s;
    background: var(--bg);
    color: var(--text);
  }
  .api-input:focus { border-color: var(--sky); }
  .start-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--sky), var(--mint));
    color: white;
    border: none;
    border-radius: 16px;
    font-family: 'Gaegu', cursive;
    font-size: 20px;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(79,195,247,0.35);
    transition: all 0.2s;
  }
  .start-btn:hover { transform: translateY(-2px); }
  .error-msg {
    color: #EF5350;
    font-size: 13px;
    margin-top: 10px;
    display: none;
  }
</style>
</head>
<body>

<div id="setup-screen" class="setup-screen">
  <div style="font-size:64px;">🦉</div>
  <h2>말랑말랑 어휘 게임</h2>
  <p>AI가 매번 새로운 문제를 만들어줘요!<br>시작하려면 Anthropic API 키를 입력해주세요.</p>
  <input class="api-input" id="api-key-input" type="password" placeholder="sk-ant-..." />
  <button class="start-btn" onclick="startGame()">🚀 게임 시작!</button>
  <p class="error-msg" id="setup-error">API 키를 확인해주세요.</p>
</div>

<div id="game-screen" style="display:none;">
  <div class="header">
    <div class="logo">말랑<span>말랑</span> 🎮</div>
    <div style="font-size:13px; color:var(--sub); cursor:pointer;" onclick="resetGame()">키 변경</div>
  </div>

  <div class="statusbar">
    <div class="badge level-badge"><span class="icon">⭐</span> 레벨 <strong id="level-display">1</strong></div>
    <div class="badge score-badge"><span class="icon">🎯</span> <strong id="score-display">0</strong>점</div>
    <div class="badge streak-badge"><span class="icon">🔥</span> 연속 <strong id="streak-display">0</strong></div>
  </div>

  <div class="levelbar-wrap">
    <div class="levelbar-label">
      <span>레벨 <span id="level-bar-label">1</span></span>
      <span id="xp-label">0 / 5 XP</span>
    </div>
    <div class="levelbar-bg">
      <div class="levelbar-fill" id="levelbar" style="width:0%"></div>
    </div>
  </div>

  <div class="mode-tabs">
    <button class="tab-btn word active" id="tab-word" onclick="switchMode('word')">📘 단어 퀴즈</button>
    <button class="tab-btn blank" id="tab-blank" onclick="switchMode('blank')">✏️ 빈칸 채우기</button>
  </div>

  <div class="game-card" id="game-card">
    <div class="loading">
      <div class="character">🦉</div>
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <p>문제 만드는 중...</p>
    </div>
  </div>

  <button class="next-btn" id="next-btn" onclick="loadQuestion()">다음 문제 →</button>
</div>

<script>
let apiKey = '';
let currentMode = 'word';
let level = 1;
let score = 0;
let streak = 0;
let xp = 0;
const XP_PER_LEVEL = 5;
let answered = false;
let correctAnswer = '';

const LEVEL_LABELS = ['1학년','1학년','2학년','2학년','3학년','3학년','4학년','4학년','5학년','5학년','6학년'];

function startGame() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key.startsWith('sk-ant-')) {
    document.getElementById('setup-error').style.display = 'block';
    return;
  }
  apiKey = key;
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('game-screen').style.display = 'block';
  loadQuestion();
}

function resetGame() {
  document.getElementById('setup-screen').style.display = 'block';
  document.getElementById('game-screen').style.display = 'none';
}

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('tab-word').classList.toggle('active', mode === 'word');
  document.getElementById('tab-blank').classList.toggle('active', mode === 'blank');
  document.getElementById('next-btn').classList.remove('show');
  loadQuestion();
}

function updateStats() {
  document.getElementById('level-display').textContent = level;
  document.getElementById('score-display').textContent = score;
  document.getElementById('streak-display').textContent = streak;
  document.getElementById('level-bar-label').textContent = level;
  document.getElementById('xp-label').textContent = xp + ' / ' + XP_PER_LEVEL + ' XP';
  document.getElementById('levelbar').style.width = (xp / XP_PER_LEVEL * 100) + '%';
}

function gainXP(amount) {
  xp += amount;
  if (xp >= XP_PER_LEVEL) {
    xp -= XP_PER_LEVEL;
    level = Math.min(level + 1, 10);
  }
  updateStats();
}

function loseXP() {
  xp = Math.max(0, xp - 1);
  if (level > 1 && xp <= 0 && streak === 0) {
    level = Math.max(1, level - 1);
    xp = XP_PER_LEVEL - 1;
  }
  updateStats();
}

function getGradeLabel() {
  return LEVEL_LABELS[Math.min(level, 10)] || '6학년';
}

async function loadQuestion() {
  answered = false;
  document.getElementById('next-btn').classList.remove('show');
  document.getElementById('game-card').innerHTML = `
    <div class="loading">
      <div class="character">${currentMode === 'word' ? '🦉' : '📝'}</div>
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <p>새 문제 만드는 중...</p>
    </div>`;

  const gradeLabel = getGradeLabel();

  let prompt = '';
  if (currentMode === 'word') {
    prompt = `당신은 초등학교 ${gradeLabel} 수준의 한국어 어휘 문제를 만드는 선생님입니다.
단어 하나와 그 뜻을 묻는 4지선다 문제를 만들어주세요.
반드시 아래 JSON 형식으로만 응답하세요. 다른 말은 절대 하지 마세요.
{
  "word": "단어",
  "question": "이 단어의 뜻은 무엇일까요?",
  "hint": "단어를 사용한 예문 1개",
  "choices": ["정답", "오답1", "오답2", "오답3"],
  "answer": 0,
  "explanation": "정답 설명 1~2문장"
}
choices 배열에서 정답 위치는 랜덤으로 섞어주세요. answer는 정답의 인덱스(0~3)입니다.`;
  } else {
    prompt = `당신은 초등학교 ${gradeLabel} 수준의 한국어 독해 문제를 만드는 선생님입니다.
짧은 문장에서 핵심 단어를 빈칸으로 만든 문제를 만들어주세요.
반드시 아래 JSON 형식으로만 응답하세요. 다른 말은 절대 하지 마세요.
{
  "question": "빈칸이 ___로 표시된 문장",
  "hint": "빈칸 단어에 대한 힌트 (초성 또는 뜻 일부)",
  "answer": "정답 단어",
  "explanation": "왜 이 단어가 들어가는지 설명 1~2문장"
}`;
  }

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 500,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();
    if (data.error) throw new Error(data.error.message);

    const raw = data.content[0].text.trim();
    const jsonStr = raw.replace(/```json|```/g, '').trim();
    const q = JSON.parse(jsonStr);

    if (currentMode === 'word') renderWordQuestion(q);
    else renderBlankQuestion(q);

  } catch (e) {
    document.getElementById('game-card').innerHTML = `
      <div class="loading">
        <div style="font-size:40px;">😢</div>
        <p style="color:#EF5350; font-weight:500;">문제를 불러오지 못했어요</p>
        <p style="font-size:12px; color:var(--sub);">${e.message}</p>
      </div>`;
    document.getElementById('next-btn').textContent = '다시 시도 →';
    document.getElementById('next-btn').classList.add('show');
  }
}

function renderWordQuestion(q) {
  correctAnswer = q.choices[q.answer];
  const shuffled = [...q.choices];

  const choicesHTML = shuffled.map((c, i) =>
    `<button class="choice-btn" onclick="checkWord(this, '${c.replace(/'/g,"\\'")}', '${correctAnswer.replace(/'/g,"\\'")}', \`${q.explanation.replace(/`/g,'\\`')}\`)">${c}</button>`
  ).join('');

  document.getElementById('game-card').innerHTML = `
    <div class="card-deco word-deco"></div>
    <div class="q-label word">📘 단어 퀴즈 · 레벨 ${level} (${getGradeLabel()})</div>
    <div class="question-text">"${q.word}"</div>
    <div class="question-hint">💡 ${q.hint}</div>
    <div class="choices">${choicesHTML}</div>
    <div class="feedback" id="feedback"></div>`;
}

function renderBlankQuestion(q) {
  correctAnswer = q.answer;
  document.getElementById('game-card').innerHTML = `
    <div class="card-deco blank-deco"></div>
    <div class="q-label blank">✏️ 빈칸 채우기 · 레벨 ${level} (${getGradeLabel()})</div>
    <div class="question-text" style="font-size:22px; line-height:1.6;">${q.question}</div>
    <div class="question-hint">💡 힌트: ${q.hint}</div>
    <div class="blank-input-wrap">
      <input class="blank-input" id="blank-ans" placeholder="정답을 입력하세요" 
        onkeydown="if(event.key==='Enter') checkBlank(\`${q.explanation.replace(/`/g,'\\`')}\`)" />
      <button class="submit-btn" onclick="checkBlank(\`${q.explanation.replace(/`/g,'\\`')}\`)">확인</button>
    </div>
    <div class="feedback" id="feedback"></div>`;

  setTimeout(() => {
    const input = document.getElementById('blank-ans');
    if (input) input.focus();
  }, 100);
}

function checkWord(btn, selected, correct, explanation) {
  if (answered) return;
  answered = true;

  const allBtns = document.querySelectorAll('.choice-btn');
  allBtns.forEach(b => b.disabled = true);

  const isCorrect = selected === correct;
  btn.classList.add(isCorrect ? 'correct' : 'wrong');

  if (!isCorrect) {
    allBtns.forEach(b => { if (b.textContent === correct) b.classList.add('correct'); });
  }

  showFeedback(isCorrect, correct, explanation);
  updateScore(isCorrect);
}

function checkBlank(explanation) {
  if (answered) return;
  const input = document.getElementById('blank-ans');
  const val = input.value.trim();
  if (!val) return;
  answered = true;

  input.disabled = true;
  document.querySelector('.submit-btn').disabled = true;

  const isCorrect = val === correctAnswer || val.replace(/\s/g,'') === correctAnswer.replace(/\s/g,'');
  input.classList.add(isCorrect ? 'correct' : 'wrong');

  showFeedback(isCorrect, correctAnswer, explanation);
  updateScore(isCorrect);
}

function showFeedback(isCorrect, correct, explanation) {
  const fb = document.getElementById('feedback');
  if (isCorrect) {
    const msgs = ['🎉 정답이에요!', '🌟 훌륭해요!', '✨ 맞았어요!', '🥳 대단해요!'];
    fb.className = 'feedback correct show';
    fb.innerHTML = `<strong>${msgs[Math.floor(Math.random()*msgs.length)]}</strong><br>${explanation}`;
  } else {
    fb.className = 'feedback wrong show';
    fb.innerHTML = `<strong>😅 아쉬워요! 정답은 "${correct}"</strong><br>${explanation}`;
  }
  document.getElementById('next-btn').classList.add('show');
}

function updateScore(isCorrect) {
  if (isCorrect) {
    streak++;
    const bonus = streak >= 3 ? 2 : 1;
    score += 10 * bonus;
    gainXP(bonus);
    if (streak === 3) showStreakEffect();
  } else {
    streak = 0;
    loseXP();
  }
  updateStats();
}

function showStreakEffect() {
  const el = document.createElement('div');
  el.style.cssText = `
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
    font-family:'Gaegu',cursive; font-size:48px; font-weight:700;
    color:var(--coral); text-align:center; pointer-events:none; z-index:999;
    animation: popFade 1.2s ease forwards;`;
  el.innerHTML = '🔥 3연속!<br><span style="font-size:24px;">보너스 2배!</span>';
  document.body.appendChild(el);

  const style = document.createElement('style');
  style.textContent = '@keyframes popFade { 0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)} 30%{opacity:1;transform:translate(-50%,-50%) scale(1.1)} 70%{opacity:1;transform:translate(-50%,-50%) scale(1)} 100%{opacity:0;transform:translate(-50%,-60%) scale(1)} }';
  document.head.appendChild(style);
  setTimeout(() => { el.remove(); style.remove(); }, 1300);
}

updateStats();
</script>
</body>
</html>
