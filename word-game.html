<style>
:root {
  --sky:#4FC3F7; --sun:#FFD54F; --mint:#80CBC4; --coral:#FF8A65;
  --lavender:#CE93D8; --bg:#FFF8E1; --card:#FFFFFF;
  --text:#37474F; --sub:#78909C; --shadow:0 4px 20px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;min-height:100vh;overflow-x:hidden;}
body{
  font-family:"Noto Sans KR",sans-serif;background:var(--bg);color:var(--text);
  background-image:radial-gradient(circle at 10% 20%,rgba(79,195,247,0.12) 0%,transparent 40%),
    radial-gradient(circle at 90% 80%,rgba(255,213,79,0.15) 0%,transparent 40%);
}
.wrap{max-width:600px;margin:0 auto;padding:0;}

/* 헤더 */
.header{padding:clamp(12px,3vw,20px) clamp(14px,4vw,24px) 10px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:"Gaegu",cursive;font-size:clamp(20px,5vw,26px);font-weight:700;color:var(--sky);}
.logo span{color:var(--coral);}
.header-right{display:flex;gap:10px;align-items:center;}
.icon-btn{font-size:clamp(12px,3vw,14px);color:var(--sub);cursor:pointer;background:none;border:none;font-family:"Noto Sans KR",sans-serif;padding:6px 10px;border-radius:10px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.icon-btn:active{background:rgba(0,0,0,0.05);}

/* 상태바 */
.statusbar{display:flex;gap:6px;align-items:center;padding:0 clamp(14px,4vw,24px) 14px;flex-wrap:wrap;}
.badge{display:flex;align-items:center;gap:5px;background:var(--card);border-radius:50px;padding:5px 12px;font-size:clamp(11px,2.5vw,13px);font-weight:500;box-shadow:var(--shadow);}
.badge .icon{font-size:14px;}
.level-badge{color:var(--coral);} .score-badge{color:var(--sky);} .streak-badge{color:var(--sun);}
.nickname-badge{color:#7B1FA2;background:#F3E5F5;}

/* 레벨바 */
.levelbar-wrap{padding:0 clamp(14px,4vw,24px) 16px;}
.levelbar-label{font-size:clamp(11px,2.5vw,12px);color:var(--sub);margin-bottom:5px;display:flex;justify-content:space-between;}
.levelbar-bg{height:8px;background:#E0E0E0;border-radius:10px;overflow:hidden;}
.levelbar-fill{height:100%;background:linear-gradient(90deg,var(--sky),var(--mint));border-radius:10px;transition:width 0.6s cubic-bezier(.4,0,.2,1);}

/* 탭 */
.mode-tabs{display:flex;gap:8px;padding:0 clamp(14px,4vw,24px) 16px;}
.tab-btn{flex:1;padding:10px 6px;border:2px solid transparent;border-radius:14px;font-family:"Noto Sans KR",sans-serif;font-size:clamp(12px,2.8vw,13px);font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:5px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.tab-btn.word{background:#E3F2FD;color:#1976D2;}
.tab-btn.blank{background:#F3E5F5;color:#7B1FA2;}
.tab-btn.word.active{background:var(--sky);color:white;border-color:#0288D1;transform:translateY(-2px);box-shadow:0 4px 12px rgba(79,195,247,0.4);}
.tab-btn.blank.active{background:var(--lavender);color:white;border-color:#8E24AA;transform:translateY(-2px);box-shadow:0 4px 12px rgba(206,147,216,0.4);}

/* 게임 카드 */
.game-card{margin:0 clamp(10px,3vw,16px) 16px;background:var(--card);border-radius:24px;padding:clamp(18px,4vw,28px) clamp(16px,4vw,24px);box-shadow:0 8px 32px rgba(0,0,0,0.10);min-height:240px;position:relative;overflow:hidden;animation:cardIn 0.35s cubic-bezier(.4,0,.2,1);}
@keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(0.98);}to{opacity:1;transform:translateY(0) scale(1);}}
.card-deco{position:absolute;top:-30px;right:-30px;width:120px;height:120px;border-radius:50%;opacity:0.08;}
.word-deco{background:var(--sky);} .blank-deco{background:var(--lavender);}
.q-label{font-size:clamp(10px,2.2vw,11px);font-weight:700;letter-spacing:1.2px;margin-bottom:12px;display:flex;align-items:center;gap:6px;}
.q-label.word{color:var(--sky);} .q-label.blank{color:var(--lavender);}
.question-text{font-family:"Gaegu",cursive;font-size:clamp(22px,5.5vw,30px);font-weight:700;color:var(--text);line-height:1.4;margin-bottom:8px;}

/* ★ 힌트/설명 폰트 키움 */
.question-hint{font-size:clamp(15px,3.5vw,18px);color:var(--sub);margin-bottom:20px;line-height:1.7;font-weight:500;}
.feedback{margin-top:14px;padding:14px 16px;border-radius:14px;font-size:clamp(15px,3.5vw,17px);line-height:1.7;font-weight:500;display:none;animation:fadeUp 0.25s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.feedback.show{display:block;}
.feedback.correct{background:#E8F5E9;color:#2E7D32;}
.feedback.wrong{background:#FFF3E0;color:#E65100;}

/* 선택지 */
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.choice-btn{padding:clamp(12px,3vw,16px) 8px;border:2px solid #E0E0E0;border-radius:14px;background:var(--bg);font-family:"Noto Sans KR",sans-serif;font-size:clamp(13px,3vw,15px);font-weight:500;color:var(--text);cursor:pointer;transition:all 0.18s;text-align:center;line-height:1.4;-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none;}
.choice-btn:hover:not(:disabled){border-color:var(--sky);background:#E3F2FD;transform:translateY(-2px);}
.choice-btn.correct{background:#E8F5E9;border-color:#4CAF50;color:#2E7D32;animation:pop 0.3s ease;}
.choice-btn.wrong{background:#FFEBEE;border-color:#EF5350;color:#C62828;animation:shake 0.3s ease;}
@keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}

/* 빈칸 */
.blank-input-wrap{display:flex;gap:8px;margin-top:8px;}
.blank-input{flex:1;padding:14px 16px;border:2px solid #E0E0E0;border-radius:14px;font-family:"Noto Sans KR",sans-serif;font-size:clamp(15px,3.5vw,17px);outline:none;transition:border-color 0.2s;background:var(--bg);color:var(--text);}
.blank-input:focus{border-color:var(--lavender);}
.blank-input.correct{border-color:#4CAF50;background:#E8F5E9;}
.blank-input.wrong{border-color:#EF5350;background:#FFEBEE;}
.submit-btn{padding:14px 18px;background:var(--lavender);color:white;border:none;border-radius:14px;font-family:"Noto Sans KR",sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.submit-btn:disabled{opacity:0.5;cursor:default;}

/* 버튼 행 */
.btn-row{display:flex;gap:8px;padding:0 clamp(10px,3vw,16px) 16px;}
.next-btn{flex:1;padding:clamp(13px,3vw,16px);background:linear-gradient(135deg,var(--coral),#FF7043);color:white;border:none;border-radius:16px;font-family:"Gaegu",cursive;font-size:clamp(17px,4vw,20px);font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(255,112,67,0.35);transition:all 0.2s;display:none;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.next-btn.show{display:block;}
.share-btn{padding:clamp(13px,3vw,16px) 14px;background:#FEE500;color:#191919;border:none;border-radius:16px;font-family:"Gaegu",cursive;font-size:clamp(15px,3.5vw,18px);font-weight:700;cursor:pointer;box-shadow:0 4px 12px rgba(254,229,0,0.4);transition:all 0.2s;display:none;white-space:nowrap;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.share-btn.show{display:block;}

/* 로딩 */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:16px;}
.loading-dots{display:flex;gap:8px;}
.loading-dots span{width:10px;height:10px;border-radius:50%;background:var(--sky);animation:bounce 0.8s infinite ease-in-out;}
.loading-dots span:nth-child(2){background:var(--coral);animation-delay:0.15s;}
.loading-dots span:nth-child(3){background:var(--mint);animation-delay:0.3s;}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-12px)}}
.loading p{font-size:14px;color:var(--sub);font-weight:500;}
.character{font-size:clamp(40px,10vw,56px);text-align:center;animation:wiggle 2s infinite ease-in-out;}
@keyframes wiggle{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}

/* 셋업/홈 */
.setup-screen{margin:clamp(16px,4vw,24px) clamp(12px,3vw,16px);background:var(--card);border-radius:24px;padding:clamp(24px,5vw,32px) clamp(18px,4vw,24px);box-shadow:var(--shadow);text-align:center;}
.setup-screen h2{font-family:"Gaegu",cursive;font-size:clamp(20px,5vw,24px);color:var(--text);margin:14px 0 8px;}
.setup-screen p{font-size:clamp(13px,3vw,14px);color:var(--sub);margin-bottom:14px;line-height:1.7;}
.field-label{font-size:clamp(11px,2.5vw,12px);color:var(--sub);text-align:left;margin-bottom:5px;font-weight:500;}
.text-input{width:100%;padding:13px 16px;border:2px solid #E0E0E0;border-radius:14px;font-size:clamp(14px,3.5vw,15px);font-family:"Noto Sans KR",sans-serif;outline:none;margin-bottom:12px;transition:border-color 0.2s;background:var(--bg);color:var(--text);}
.text-input:focus{border-color:var(--sky);}
.api-input{font-family:monospace;font-size:clamp(12px,3vw,13px);}
.start-btn{width:100%;padding:clamp(13px,3vw,16px);background:linear-gradient(135deg,var(--sky),var(--mint));color:white;border:none;border-radius:14px;font-family:"Gaegu",cursive;font-size:clamp(18px,4.5vw,20px);font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(79,195,247,0.35);transition:all 0.2s;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.error-msg{color:#EF5350;font-size:13px;margin-top:10px;display:none;}
.saved-notice{font-size:11px;color:#4CAF50;text-align:center;margin-top:6px;display:none;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#37474F;color:white;font-size:13px;font-weight:500;padding:10px 20px;border-radius:50px;opacity:0;transition:all 0.3s;pointer-events:none;z-index:999;white-space:nowrap;max-width:90vw;text-align:center;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* 홈 화면 */
.home-action-btn{width:100%;padding:clamp(15px,3.5vw,18px);border:none;border-radius:18px;font-family:"Gaegu",cursive;font-size:clamp(18px,4.5vw,22px);font-weight:700;cursor:pointer;transition:all 0.2s;margin-bottom:10px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.home-action-btn:active{transform:scale(0.97);}
</style>
</head>
<body>
<div class="wrap">

<!-- 홈 화면 -->
<div id="home-screen" style="display:none;">
  <div style="text-align:center;padding:clamp(30px,7vw,50px) 24px 0;">
    <div style="font-size:clamp(56px,14vw,80px);animation:wiggle 2s infinite ease-in-out;display:inline-block;">🦉</div>
    <h1 style="font-family:'Gaegu',cursive;font-size:clamp(26px,7vw,36px);color:#4FC3F7;margin:10px 0 4px;">말랑말랑</h1>
    <p style="font-size:clamp(13px,3vw,15px);color:#78909C;margin-bottom:clamp(24px,5vw,36px);">AI 어휘 게임</p>
  </div>
  <div style="padding:0 clamp(14px,4vw,20px);display:flex;flex-direction:column;gap:10px;">
    <button id="home-continue-btn" class="home-action-btn" style="background:linear-gradient(135deg,#4FC3F7,#80CBC4);color:white;box-shadow:0 4px 16px rgba(79,195,247,0.35);">▶ 이어하기</button>
    <button id="home-new-btn" class="home-action-btn" style="background:linear-gradient(135deg,#FF8A65,#FF7043);color:white;box-shadow:0 4px 16px rgba(255,112,67,0.35);">🆕 새로 시작</button>
    <button id="home-key-btn" class="home-action-btn" style="background:white;color:#78909C;border:1.5px solid #E0E0E0;font-size:clamp(14px,3.5vw,16px);font-family:'Noto Sans KR',sans-serif;font-weight:500;">🔑 API 키 변경</button>
  </div>
  <div id="home-save-info" style="margin:16px clamp(14px,4vw,20px) 0;background:white;border-radius:14px;padding:14px 18px;box-shadow:0 2px 12px rgba(0,0,0,0.06);display:none;">
    <p style="font-size:12px;color:#78909C;margin:0 0 5px;">저장된 기록</p>
    <p id="home-save-text" style="font-size:clamp(13px,3vw,15px);font-weight:500;color:#37474F;margin:0;"></p>
  </div>
</div>

<!-- API 키 입력 -->
<div id="setup-screen" class="setup-screen">
  <div style="font-size:clamp(48px,12vw,64px);">🦉</div>
  <h2>말랑말랑 어휘 게임</h2>
  <p>AI가 매번 새로운 문제를 만들어줘요!</p>
  <div class="field-label">내 이름 (닉네임)</div>
  <input class="text-input" id="nickname-input" placeholder="예: 지우, 민준, 엄마..." maxlength="10"/>
  <div class="field-label">Anthropic API 키</div>
  <input class="text-input api-input" id="api-key-input" type="password" placeholder="sk-ant-..."/>
  <p class="saved-notice" id="saved-notice"></p>
  <button class="start-btn" id="start-btn">🚀 게임 시작!</button>
  <p class="error-msg" id="setup-error">이름과 API 키를 모두 입력해주세요.</p>
</div>

<!-- 게임 화면 -->
<div id="game-screen" style="display:none;">
  <div class="header">
    <div class="logo">말랑<span>말랑</span> 🎮</div>
    <div class="header-right">
      <button class="icon-btn" id="home-btn">🏠 홈</button>
      <button class="icon-btn" id="key-btn">키 변경</button>
    </div>
  </div>
  <div class="statusbar">
    <div class="badge nickname-badge"><span class="icon">👤</span><strong id="nickname-display"></strong></div>
    <div class="badge level-badge"><span class="icon">⭐</span>레벨 <strong id="level-display">1</strong></div>
    <div class="badge score-badge"><span class="icon">🎯</span><strong id="score-display">0</strong>점</div>
    <div class="badge streak-badge"><span class="icon">🔥</span>연속 <strong id="streak-display">0</strong></div>
  </div>
  <div class="levelbar-wrap">
    <div class="levelbar-label">
      <span>레벨 <span id="level-bar-label">1</span> · <span id="grade-label">1학년</span></span>
      <span id="xp-label">0 / 5 XP</span>
    </div>
    <div class="levelbar-bg"><div class="levelbar-fill" id="levelbar" style="width:0%"></div></div>
  </div>
  <div class="mode-tabs">
    <button class="tab-btn word active" id="tab-word">📘 단어 퀴즈</button>
    <button class="tab-btn blank" id="tab-blank">✏️ 빈칸 채우기</button>
  </div>
  <div class="game-card" id="game-card">
    <div class="loading">
      <div class="character">🦉</div>
      <div class="loading-dots"><span></span><span></span><span></span></div>
      <p>문제 만드는 중...</p>
    </div>
  </div>
  <div class="btn-row">
    <button class="next-btn" id="next-btn">다음 문제 →</button>
    <button class="share-btn" id="share-btn">카카오 공유 💬</button>
  </div>
</div>

<div class="toast" id="toast"></div>
</div>

<script>
let apiKey="",nickname="",currentMode="word";
let level=1,score=0,streak=0,xp=0,bestStreak=0,totalAnswered=0,totalCorrect=0;
const XP_PER_LEVEL=5;
let answered=false,correctAnswer="";
const LEVEL_LABELS=["1학년","1학년","2학년","2학년","3학년","3학년","4학년","4학년","5학년","5학년","6학년"];
const SAVE_KEY="malrang_save";

// ── 저장/불러오기 ──
function saveProgress(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify({level,score,xp,bestStreak,totalAnswered,totalCorrect,nickname}));}catch(e){}
}
function loadProgress(){
  try{const r=localStorage.getItem(SAVE_KEY);return r?JSON.parse(r):null;}catch(e){return null;}
}

// ── 초기화 ──
window.addEventListener("DOMContentLoaded",()=>{
  const saved=loadProgress();
  if(saved){
    document.getElementById("nickname-input").value=saved.nickname||"";
    const n=document.getElementById("saved-notice");
    n.style.display="block";
    n.textContent="✅ "+saved.nickname+"님의 기록 발견! (레벨 "+saved.level+", "+saved.score+"점)";
    showHomeScreen();
  }
  // 버튼 이벤트 — 모두 addEventListener로 통일
  addTap("start-btn",startGame);
  addTap("home-continue-btn",continueGame);
  addTap("home-new-btn",()=>{hide("home-screen");show("setup-screen");});
  addTap("home-key-btn",resetGame);
  addTap("home-btn",showHomeScreen);
  addTap("key-btn",resetGame);
  addTap("next-btn",loadQuestion);
  addTap("share-btn",shareResult);
  addTap("tab-word",()=>switchMode("word"));
  addTap("tab-blank",()=>switchMode("blank"));
});

function addTap(id,fn){
  const el=document.getElementById(id);
  if(!el)return;
  el.addEventListener("click",fn);
  el.addEventListener("touchend",function(e){e.preventDefault();fn();});
}
function show(id){document.getElementById(id).style.display="block";}
function hide(id){document.getElementById(id).style.display="none";}

// ── 화면 전환 ──
function showHomeScreen(){
  const saved=loadProgress();
  hide("setup-screen");hide("game-screen");show("home-screen");
  if(saved){
    show("home-save-info");
    document.getElementById("home-save-text").textContent=
      "👤 "+saved.nickname+"  ⭐ 레벨 "+saved.level+"  🎯 "+saved.score+"점";
    document.getElementById("home-continue-btn").style.display="block";
  }else{
    document.getElementById("home-continue-btn").style.display="none";
  }
}

function continueGame(){
  const saved=loadProgress();
  if(!saved){hide("home-screen");show("setup-screen");return;}
  if(!apiKey){hide("home-screen");show("setup-screen");return;}
  nickname=saved.nickname;level=saved.level||1;score=saved.score||0;
  xp=saved.xp||0;bestStreak=saved.bestStreak||0;
  totalAnswered=saved.totalAnswered||0;totalCorrect=saved.totalCorrect||0;
  document.getElementById("nickname-display").textContent=nickname;
  hide("home-screen");show("game-screen");
  updateStats();loadQuestion();
}

function startGame(){
  const key=document.getElementById("api-key-input").value.trim();
  const name=document.getElementById("nickname-input").value.trim();
  if(!name||!key.startsWith("sk-ant-")){show("setup-error");return;}
  apiKey=key;nickname=name;
  const saved=loadProgress();
  if(saved&&saved.nickname===name){
    level=saved.level||1;score=saved.score||0;xp=saved.xp||0;
    bestStreak=saved.bestStreak||0;totalAnswered=saved.totalAnswered||0;totalCorrect=saved.totalCorrect||0;
    showToast("🎉 "+name+"님, 돌아오셨군요! 레벨 "+level+"부터 시작!");
  }else{level=1;score=0;xp=0;bestStreak=0;totalAnswered=0;totalCorrect=0;}
  document.getElementById("nickname-display").textContent=name;
  hide("setup-screen");hide("home-screen");show("game-screen");
  updateStats();loadQuestion();
}

function resetGame(){
  apiKey="";
  hide("game-screen");hide("home-screen");show("setup-screen");
}

function switchMode(mode){
  currentMode=mode;
  document.getElementById("tab-word").classList.toggle("active",mode==="word");
  document.getElementById("tab-blank").classList.toggle("active",mode==="blank");
  document.getElementById("next-btn").classList.remove("show");
  document.getElementById("share-btn").classList.remove("show");
  loadQuestion();
}

// ── 통계 ──
function updateStats(){
  document.getElementById("level-display").textContent=level;
  document.getElementById("score-display").textContent=score;
  document.getElementById("streak-display").textContent=streak;
  document.getElementById("level-bar-label").textContent=level;
  document.getElementById("grade-label").textContent=getGradeLabel();
  document.getElementById("xp-label").textContent=xp+" / "+XP_PER_LEVEL+" XP";
  document.getElementById("levelbar").style.width=(xp/XP_PER_LEVEL*100)+"%";
}
function gainXP(a){
  xp+=a;
  if(xp>=XP_PER_LEVEL){xp-=XP_PER_LEVEL;level=Math.min(level+1,10);showToast("🎊 레벨업! 레벨 "+level+"!");}
  updateStats();saveProgress();
}
function loseXP(){
  xp=Math.max(0,xp-1);
  if(level>1&&xp<=0&&streak===0){level=Math.max(1,level-1);xp=XP_PER_LEVEL-1;}
  updateStats();saveProgress();
}
function getGradeLabel(){return LEVEL_LABELS[Math.min(level,10)]||"6학년";}

// ── 문제 생성 ──
// ★ 교과서 위주 + 레벨별 난이도 강화 프롬프트
const GRADE_CONTEXT = [
  "","초등 1~2학년 교과서",
  "초등 1~2학년 교과서","초등 3~4학년 교과서",
  "초등 3~4학년 교과서","초등 5~6학년 교과서",
  "초등 5~6학년 교과서","중학교 교과서",
  "중학교 교과서","고등학교 교과서",
  "고등학교 교과서"
];

async function loadQuestion(){
  answered=false;
  document.getElementById("next-btn").classList.remove("show");
  document.getElementById("share-btn").classList.remove("show");
  document.getElementById("game-card").innerHTML=`<div class="loading"><div class="character">${currentMode==="word"?"🦉":"📝"}</div><div class="loading-dots"><span></span><span></span><span></span></div><p>새 문제 만드는 중...</p></div>`;

  const ctx=GRADE_CONTEXT[Math.min(level,10)];

  let prompt=currentMode==="word"
    ?`당신은 ${ctx} 어휘 문제를 출제하는 선생님입니다.
${ctx}에 실제로 등장하는 어휘 중 학생들이 틀리기 쉬운 단어 하나를 골라 4지선다 문제를 만드세요.
선택지는 뜻이 비슷하거나 헷갈리는 것으로 구성해 난이도를 높이세요.
반드시 아래 JSON만 응답하세요. 다른 말 금지.
{"word":"단어","hint":"이 단어가 쓰인 교과서 예문 1개","choices":["정답","오답1","오답2","오답3"],"answer":0,"explanation":"정답 해설 2~3문장. 왜 다른 선택지가 틀렸는지 포함."}`
    :`당신은 ${ctx} 독해 문제를 출제하는 선생님입니다.
${ctx} 수준의 문장에서 핵심 어휘를 빈칸으로 만드세요. 문맥으로 유추해야 하는 수준으로 만드세요.
반드시 아래 JSON만 응답하세요. 다른 말 금지.
{"question":"빈칸이 ___인 문장","hint":"초성 힌트 또는 뜻 일부","answer":"정답단어","explanation":"해설 2~3문장. 문맥 근거 포함."}`;

  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:600,messages:[{role:"user",content:prompt}]})
    });
    const data=await res.json();
    if(data.error)throw new Error(data.error.message);
    const q=JSON.parse(data.content[0].text.trim().replace(/```json|```/g,"").trim());
    if(currentMode==="word")renderWordQuestion(q);
    else renderBlankQuestion(q);
  }catch(e){
    document.getElementById("game-card").innerHTML=`<div class="loading"><div style="font-size:40px;">😢</div><p style="color:#EF5350;font-weight:500;">문제를 불러오지 못했어요</p><p style="font-size:12px;color:var(--sub)">${e.message}</p></div>`;
    document.getElementById("next-btn").textContent="다시 시도 →";
    document.getElementById("next-btn").classList.add("show");
  }
}

// ── 문제 렌더링 ──
function renderWordQuestion(q){
  const correctIdx=q.answer;
  correctAnswer=q.choices[correctIdx];
  window._wqData={correctIdx,explanation:q.explanation};
  const choicesHTML=q.choices.map((c,i)=>`<button class="choice-btn" data-idx="${i}">${c}</button>`).join("");
  document.getElementById("game-card").innerHTML=
    `<div class="card-deco word-deco"></div>`+
    `<div class="q-label word">📘 단어 퀴즈 · 레벨 ${level} (${getGradeLabel()})</div>`+
    `<div class="question-text">"${q.word}"</div>`+
    `<div class="question-hint">💡 ${q.hint}</div>`+
    `<div class="choices">${choicesHTML}</div>`+
    `<div class="feedback" id="feedback"></div>`;
  document.querySelectorAll(".choice-btn").forEach(btn=>{
    btn.addEventListener("click",handleChoiceClick);
    btn.addEventListener("touchend",function(e){e.preventDefault();handleChoiceClick.call(this,e);});
  });
}

function handleChoiceClick(){
  if(answered)return;
  const{correctIdx,explanation}=window._wqData;
  const clickedIdx=parseInt(this.dataset.idx);
  const isCorrect=clickedIdx===correctIdx;
  answered=true;
  document.querySelectorAll(".choice-btn").forEach(b=>{
    b.disabled=true;
    if(parseInt(b.dataset.idx)===correctIdx)b.classList.add("correct");
  });
  if(!isCorrect)this.classList.add("wrong");
  showFeedback(isCorrect,correctAnswer,explanation);
  updateScore(isCorrect);
}

function renderBlankQuestion(q){
  correctAnswer=q.answer;
  document.getElementById("game-card").innerHTML=
    `<div class="card-deco blank-deco"></div>`+
    `<div class="q-label blank">✏️ 빈칸 채우기 · 레벨 ${level} (${getGradeLabel()})</div>`+
    `<div class="question-text" style="font-size:clamp(18px,4.5vw,24px);line-height:1.6;">${q.question}</div>`+
    `<div class="question-hint">💡 힌트: ${q.hint}</div>`+
    `<div class="blank-input-wrap">`+
    `<input class="blank-input" id="blank-ans" placeholder="정답을 입력하세요"/>`+
    `<button class="submit-btn" id="submit-blank-btn">확인</button>`+
    `</div><div class="feedback" id="feedback"></div>`;
  const submitFn=()=>{
    if(answered)return;
    const input=document.getElementById("blank-ans");
    const val=input.value.trim();if(!val)return;
    answered=true;input.disabled=true;
    document.getElementById("submit-blank-btn").disabled=true;
    const isCorrect=val===correctAnswer||val.replace(/\s/g,"")===correctAnswer.replace(/\s/g,"");
    input.classList.add(isCorrect?"correct":"wrong");
    showFeedback(isCorrect,correctAnswer,q.explanation);
    updateScore(isCorrect);
  };
  document.getElementById("blank-ans").addEventListener("keydown",e=>{if(e.key==="Enter")submitFn();});
  addTap("submit-blank-btn",submitFn);
  setTimeout(()=>{const i=document.getElementById("blank-ans");if(i)i.focus();},100);
}

// ── 피드백/점수 ──
function showFeedback(isCorrect,correct,explanation){
  const fb=document.getElementById("feedback");
  const msgs=["🎉 정답이에요!","🌟 훌륭해요!","✨ 맞았어요!","🥳 대단해요!"];
  fb.className="feedback "+(isCorrect?"correct":"wrong")+" show";
  fb.innerHTML=isCorrect
    ?`<strong>${msgs[Math.floor(Math.random()*msgs.length)]}</strong><br>${explanation}`
    :`<strong>😅 아쉬워요! 정답은 "${correct}"</strong><br>${explanation}`;
  document.getElementById("next-btn").classList.add("show");
  document.getElementById("share-btn").classList.add("show");
}

function updateScore(isCorrect){
  totalAnswered++;
  if(isCorrect){
    totalCorrect++;streak++;
    if(streak>bestStreak)bestStreak=streak;
    const bonus=streak>=3?2:1;
    score+=10*bonus;gainXP(bonus);
    if(streak===3)showStreakEffect();
  }else{streak=0;loseXP();}
  updateStats();saveProgress();
}

// ── 공유 ──
function shareResult(){
  const acc=totalAnswered>0?Math.round(totalCorrect/totalAnswered*100):0;
  const text=`🦉 말랑말랑 어휘 게임 결과\n\n👤 ${nickname}\n⭐ 레벨 ${level} (${getGradeLabel()})\n🎯 점수: ${score}점\n🔥 최고 연속: ${bestStreak}개\n📊 정답률: ${acc}% (${totalCorrect}/${totalAnswered})\n\n나도 도전! 👉 ${window.location.href}`;
  if(navigator.share){navigator.share({title:"말랑말랑 어휘 게임",text}).catch(()=>copyToClipboard(text));}
  else copyToClipboard(text);
}
function copyToClipboard(text){
  navigator.clipboard.writeText(text).then(()=>showToast("📋 복사됐어요! 카카오톡에 붙여넣기하세요 😊")).catch(()=>showToast("복사해서 공유해주세요"));
}

// ── 토스트/이펙트 ──
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),3000);
}
function showStreakEffect(){
  const el=document.createElement("div");
  el.style.cssText="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Gaegu',cursive;font-size:clamp(36px,8vw,48px);font-weight:700;color:var(--coral);text-align:center;pointer-events:none;z-index:999;animation:popFade 1.2s ease forwards;";
  el.innerHTML="🔥 3연속!<br><span style='font-size:clamp(18px,4vw,24px);'>보너스 2배!</span>";
  document.body.appendChild(el);
  const s=document.createElement("style");
  s.textContent="@keyframes popFade{0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}30%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-60%) scale(1)}}";
  document.head.appendChild(s);
  setTimeout(()=>{el.remove();s.remove();},1300);
}

updateStats();
</script>
</body>
</html>
